version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: my-habitica-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: habitica
      POSTGRES_USER: habitica
      POSTGRES_PASSWORD: habitica
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitica -d habitica"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: my-habitica-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://habitica:habitica@postgres:5432/habitica
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
    volumes:
      # Hot reload: mount source so changes are reflected without rebuild
      - ./apps/api:/app/apps/api
      # Prevent host node_modules from overriding container's
      - /app/apps/api/node_modules

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    container_name: my-habitica-web
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
